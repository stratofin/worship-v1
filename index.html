<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共鳴與捨己 | 新生命敬拜團 MD 養成手冊</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;background:#f5f0e8;color:#2d2d2d;line-height:1.7}

/* ── Layout ── */
#root{display:flex;height:100vh}
.sidebar{width:270px;min-width:270px;background:#1a1a35;color:#e0dbd0;display:flex;flex-direction:column;overflow:hidden;transition:width .3s;z-index:10}
.sidebar.collapsed{width:52px;min-width:52px}
.main-area{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* ── Sidebar ── */
.sidebar-header{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#c9a84c,#e8c97a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sidebar-title-text{overflow:hidden}
.sidebar-title-text h1{font-size:13px;font-weight:700;color:#c9a84c;white-space:nowrap}
.sidebar-title-text p{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;white-space:nowrap}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-track{background:transparent}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.nav-chapter{margin-bottom:2px}
.nav-chapter-btn{width:100%;padding:10px 16px;display:flex;align-items:center;gap:10px;background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;text-align:left;font-size:13px;font-family:inherit;transition:all .2s;border-radius:6px;margin:0 6px;width:calc(100% - 12px)}
.nav-chapter-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-chapter-btn.active{background:rgba(201,168,76,.15);color:#c9a84c}
.nav-chapter-btn .emoji{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.nav-chapter-btn .nav-label{overflow:hidden;white-space:nowrap}
.nav-chapter-btn .nav-label .nav-main{font-size:12px;font-weight:600;display:block;overflow:hidden;text-overflow:ellipsis}
.nav-chapter-btn .nav-label .nav-sub{font-size:10px;opacity:.6;display:block}
.nav-chapter-btn .arrow{margin-left:auto;font-size:10px;transition:transform .2s;flex-shrink:0}
.nav-chapter-btn.open .arrow{transform:rotate(90deg)}
.nav-sections{overflow:hidden;transition:max-height .3s ease}
.nav-section-item{padding:7px 16px 7px 48px;font-size:12px;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-section-item:hover{color:rgba(255,255,255,.85)}
.nav-section-item.active{color:#c9a84c;font-weight:600}

/* collapse toggle */
.toggle-btn{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:flex-end;flex-shrink:0}
.toggle-btn button{background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.5);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s}
.toggle-btn button:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── Chapter Header ── */
.chapter-banner{background:linear-gradient(135deg,#1a1a35,#2a2a50);color:#fff;padding:40px 48px 32px;flex-shrink:0}
.chapter-banner .chapter-label{font-size:11px;color:#c9a84c;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.chapter-banner h2{font-size:28px;font-weight:700;line-height:1.3}
.chapter-banner .chapter-sub{font-size:14px;color:rgba(255,255,255,.5);margin-top:8px;font-style:italic}
.chapter-banner .chapter-desc{font-size:14px;color:rgba(255,255,255,.7);margin-top:16px;line-height:1.8;max-width:640px}

/* ── Content Area ── */
.content-body{padding:32px 48px 64px;max-width:800px}
.content-body h3{font-size:18px;font-weight:700;color:#1a1a35;margin:32px 0 12px;padding-bottom:8px;border-bottom:2px solid #c9a84c}
.content-body h4{font-size:15px;font-weight:700;color:#2a2a50;margin:22px 0 10px}
.content-body p{font-size:14.5px;line-height:1.85;margin-bottom:12px;color:#3a3a3a}
.content-body p.highlight{color:#c0392b;font-weight:600}
.content-body .quote-block{border-left:4px solid #c9a84c;padding:14px 20px;background:rgba(201,168,76,.08);border-radius:0 8px 8px 0;margin:20px 0;font-style:italic;color:#4a4a4a;font-size:15px;line-height:1.8}
.content-body ul{margin:10px 0 16px 0;padding-left:0;list-style:none}
.content-body ul li{font-size:14px;line-height:1.8;color:#3a3a3a;padding:4px 0 4px 20px;position:relative}
.content-body ul li::before{content:"●";position:absolute;left:0;color:#c9a84c;font-size:10px;top:7px}
.content-body ul.sub li::before{content:"○";color:#aaa;font-size:10px;top:7px}
.content-body ul.sub{margin-left:20px}
.content-body ul li b,.content-body ul li strong{color:#1a1a35}
.content-body .divider{border:none;border-top:1px solid #e0dbd0;margin:28px 0}
.content-body .callout{background:rgba(26,26,53,.04);border:1px solid rgba(26,26,53,.1);border-radius:10px;padding:18px 22px;margin:20px 0}
.content-body .callout h4{margin-top:0;color:#1a1a35}
.content-body .keypoint{background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.05));border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:16px 20px;margin:20px 0;font-size:14px;color:#3a3530;line-height:1.8}
.content-body .keypoint strong{color:#7a5f10}
.content-body .homework{background:rgba(26,26,53,.03);border:1px dashed rgba(26,26,53,.2);border-radius:10px;padding:18px 22px;margin:24px 0}
.content-body .homework h4{color:#1a1a35;margin-bottom:10px;margin-top:0}
.content-body .homework p{margin-bottom:8px}

/* Tables */
.content-body table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13.5px}
.content-body table th{background:#1a1a35;color:#c9a84c;padding:10px 14px;text-align:left;font-weight:600}
.content-body table td{padding:10px 14px;border-bottom:1px solid #e5e0d8;vertical-align:top;line-height:1.7}
.content-body table tr:nth-child(even) td{background:rgba(201,168,76,.04)}
.content-body table tr:hover td{background:rgba(201,168,76,.08)}
.content-body table td b{color:#1a1a35}
.content-body table td.level{font-weight:700;color:#1a1a35;white-space:nowrap}
.content-body table td.vibe{color:#5a5a7a;font-style:italic}

/* ── Notes System ── */
.section-wrapper{position:relative}
.note-toggle-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid #d5cfc5;color:#7a7a8a;padding:6px 14px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;margin:16px 0 8px;transition:all .2s}
.note-toggle-btn:hover{border-color:#c9a84c;color:#c9a84c;background:rgba(201,168,76,.06)}
.note-toggle-btn.has-notes{border-color:#c9a84c;color:#c9a84c;background:rgba(201,168,76,.08)}
.note-panel{background:#fff;border:1px solid #e0dbd0;border-radius:12px;margin:8px 0 24px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.note-tabs{display:flex;border-bottom:1px solid #eee}
.note-tab{flex:1;padding:10px;text-align:center;font-size:12.5px;font-weight:600;cursor:pointer;color:#999;border-bottom:2px solid transparent;transition:all .2s}
.note-tab.active{color:#1a1a35;border-bottom-color:#c9a84c}
.note-tab-content{padding:16px}
.note-textarea{width:100%;border:1px solid #e0dbd0;border-radius:8px;padding:10px 14px;font-size:13px;font-family:inherit;resize:vertical;min-height:80px;line-height:1.7;color:#2d2d2d;outline:none;transition:border .2s}
.note-textarea:focus{border-color:#c9a84c}
.note-save-btn{margin-top:8px;background:#1a1a35;color:#c9a84c;border:none;padding:7px 18px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.note-save-btn:hover{background:#2a2a50}
.note-entry{background:#f9f7f3;border-radius:8px;padding:12px 14px;margin-bottom:10px;border-left:3px solid #c9a84c}
.note-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.note-author{font-size:11px;font-weight:700;color:#1a1a35}
.note-time{font-size:10px;color:#aaa}
.note-text{font-size:13px;line-height:1.7;color:#3a3a3a;white-space:pre-wrap}
.note-delete-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:2px 4px}
.note-delete-btn:hover{color:#e74c3c}
.no-notes{font-size:13px;color:#bbb;text-align:center;padding:20px 0}
.public-input-row{display:flex;gap:8px;margin-bottom:10px}
.name-input{border:1px solid #e0dbd0;border-radius:6px;padding:8px 12px;font-size:13px;font-family:inherit;flex:1;outline:none;transition:border .2s}
.name-input:focus{border-color:#c9a84c}
.export-bar{padding:10px 16px;background:#f5f0e8;border-top:1px solid #eee;display:flex;gap:8px;align-items:center;font-size:11px;color:#999}
.export-btn{background:none;border:1px solid #d5cfc5;color:#7a7a8a;padding:4px 10px;border-radius:4px;font-size:11px;font-family:inherit;cursor:pointer;transition:all .2s}
.export-btn:hover{border-color:#1a1a35;color:#1a1a35}

/* ── Todo Checklist ── */
.todo-list{margin:12px 0}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0ebe3}
.todo-item:last-child{border-bottom:none}
.todo-checkbox{width:18px;height:18px;min-width:18px;border:2px solid #c9a84c;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;background:#fff;transition:all .2s;margin-top:2px}
.todo-checkbox.checked{background:#c9a84c;border-color:#c9a84c}
.todo-text{font-size:14px;line-height:1.7;color:#3a3a3a}
.todo-text.checked{text-decoration:line-through;color:#aaa}

/* ── Progress Bar ── */
.progress-bar-wrap{height:3px;background:rgba(255,255,255,.1)}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#e8c97a);transition:width .4s ease}

/* ── Responsive ── */
@media(max-width:768px){
  .chapter-banner{padding:24px 20px}
  .content-body{padding:20px 20px 48px}
  .content-body h3{font-size:16px}
}

/* Scrollbar */
.main-area::-webkit-scrollbar{width:6px}
.main-area::-webkit-scrollbar-track{background:#f0ebe3}
.main-area::-webkit-scrollbar-thumb{background:#d5cfc5;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const HANDBOOK = [
  {

          { type: "h4", text: "常見指令白話對照表" },

// ══════════════════════════════════════════════
//  STORAGE HELPERS
// ══════════════════════════════════════════════
const STORAGE = {
  getPrivateNote: (sectionId) => {
    try { return JSON.parse(localStorage.getItem(`md_priv_${sectionId}`) || 'null'); } catch { return null; }
  },
  setPrivateNote: (sectionId, data) => {
    localStorage.setItem(`md_priv_${sectionId}`, JSON.stringify(data));
  },
  getPublicNotes: (sectionId) => {
    try { return JSON.parse(localStorage.getItem(`md_pub_${sectionId}`) || '[]'); } catch { return []; }
  },
  addPublicNote: (sectionId, note) => {
    const notes = STORAGE.getPublicNotes(sectionId);
    notes.push({ ...note, id: Date.now() + Math.random() });
    localStorage.setItem(`md_pub_${sectionId}`, JSON.stringify(notes));
    return notes;
  },
  deletePublicNote: (sectionId, noteId) => {
    const notes = STORAGE.getPublicNotes(sectionId).filter(n => n.id !== noteId);
    localStorage.setItem(`md_pub_${sectionId}`, JSON.stringify(notes));
    return notes;
  },
  getUserName: () => localStorage.getItem('md_handbook_username') || '',
  setUserName: (name) => localStorage.setItem('md_handbook_username', name),
  exportAll: () => {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('md_')) data[key] = localStorage.getItem(key);
    }
    return JSON.stringify(data, null, 2);
  },
  importAll: (jsonStr) => {
    const data = JSON.parse(jsonStr);
    Object.entries(data).forEach(([k, v]) => { if (k.startsWith('md_')) localStorage.setItem(k, v); });
  }
};

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}

// ══════════════════════════════════════════════
//  CONTENT RENDERER
// ══════════════════════════════════════════════
function renderContent(node, idx) {
  switch (node.type) {
    case 'p':
      return <p key={idx} className={node.highlight ? 'highlight' : ''}>{node.text}</p>;
    case 'h3':
      return <h3 key={idx}>{node.text}</h3>;
    case 'h4':
      return <h4 key={idx}>{node.text}</h4>;
    case 'quote':
      return <div key={idx} className="quote-block">{node.text}</div>;
    case 'divider':
      return <hr key={idx} className="divider" />;
    case 'keypoint':
      return <div key={idx} className="keypoint"><strong>核心觀念：</strong>{node.text}</div>;
    case 'list':
      return (
        <ul key={idx}>
          {node.items.map((item, i) => (
            <li key={i} style={item.highlight ? { color: '#c0392b', fontWeight: 600 } : {}}>
              {typeof item === 'string' ? item : item.text}
            </li>
          ))}
        </ul>
      );
    case 'callout':
      return (
        <div key={idx} className="callout">
          {node.items.map((item, i) => (
            <p key={i} style={{ marginBottom: i < node.items.length - 1 ? 8 : 0 }}>
              {typeof item === 'string' ? item : item.text}
            </p>
          ))}
        </div>
      );
    case 'table':
      return (
        <div key={idx} style={{ overflowX: 'auto' }}>
          <table>
            <thead>
              <tr>{node.headers.map((h, i) => <th key={i}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {node.rows.map((row, i) => (
                <tr key={i}>
                  {row.map((cell, j) => (
                    <td key={j} className={j === 0 ? 'level' : j === 1 ? 'vibe' : ''}
                        style={{ whiteSpace: 'pre-line' }}>
                      {cell}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    case 'homework':
      return (
        <div key={idx} className="homework">
          <h4>📝 {node.title || '思考作業'}</h4>
          {node.items.map((item, i) => <p key={i}>• {item}</p>)}
        </div>
      );
    case 'todo':
      return <TodoChecklist key={idx} items={node.items} sectionId="conclusion-todos" />;
    default:
      return null;
  }
}

// ══════════════════════════════════════════════
//  TODO CHECKLIST COMPONENT
// ══════════════════════════════════════════════
function TodoChecklist({ items, sectionId }) {
  const [checked, setChecked] = useState(() => {
    try { return JSON.parse(localStorage.getItem(`md_todo_${sectionId}`) || '[]'); } catch { return []; }
  });
  const toggle = (idx) => {
    const next = checked.includes(idx) ? checked.filter(i => i !== idx) : [...checked, idx];
    setChecked(next);
    localStorage.setItem(`md_todo_${sectionId}`, JSON.stringify(next));
  };
  return (
    <div className="todo-list">
      {items.map((item, idx) => (
        <div key={idx} className="todo-item" onClick={() => toggle(idx)} style={{ cursor: 'pointer' }}>
          <div className={`todo-checkbox${checked.includes(idx) ? ' checked' : ''}`}>
            {checked.includes(idx) ? '✓' : ''}
          </div>
          <span className={`todo-text${checked.includes(idx) ? ' checked' : ''}`}>{item}</span>
        </div>
      ))}
    </div>
  );
}

function NotesPanel({ sectionId }) {
  const [open, setOpen] = useState(false);
  const [tab, setTab] = useState('private');
  const [privateText, setPrivateText] = useState('');
  const [publicNotes, setPublicNotes] = useState([]);
  const [pubInput, setPubInput] = useState('');
  const [authorName, setAuthorName] = useState(STORAGE.getUserName());
  const hasPrivate = !!privateText.trim();
  const hasPublic = publicNotes.length > 0;

  useEffect(() => {
    const saved = STORAGE.getPrivateNote(sectionId);
    if (saved) setPrivateText(saved.text || '');
    setPublicNotes(STORAGE.getPublicNotes(sectionId));
  }, [sectionId]);

  const savePrivate = () => {
    STORAGE.setPrivateNote(sectionId, { text: privateText, updatedAt: Date.now() });
    alert('備註已儲存！');
  };

  const addPublicNote = () => {
    if (!pubInput.trim()) return;
    const name = authorName.trim() || '匿名';
    STORAGE.setUserName(name);
    const updated = STORAGE.addPublicNote(sectionId, { author: name, text: pubInput, createdAt: Date.now() });
    setPublicNotes(updated);
    setPubInput('');
    setAuthorName(name);
  };

  const deletePublicNote = (noteId) => {
    const updated = STORAGE.deletePublicNote(sectionId, noteId);
    setPublicNotes(updated);
  };

  const noteCount = (hasPrivate ? 1 : 0) + publicNotes.length;

  return (
    <div className="section-wrapper">
      <button className={`note-toggle-btn${noteCount > 0 ? ' has-notes' : ''}`} onClick={() => setOpen(!open)}>
        <span>✏️</span>
        <span>{open ? '收起備註' : `備註 / 討論${noteCount > 0 ? ` (${noteCount})` : ''}`}</span>
        <span style={{ marginLeft: 4 }}>{open ? '▲' : '▼'}</span>
      </button>
      {open && (
        <div className="note-panel">
          <div className="note-tabs">
            <div className={`note-tab${tab === 'private' ? ' active' : ''}`} onClick={() => setTab('private')}>
              🔒 我的備註{hasPrivate ? ' ●' : ''}
            </div>
            <div className={`note-tab${tab === 'public' ? ' active' : ''}`} onClick={() => setTab('public')}>
              💬 團隊討論{hasPublic ? ` (${publicNotes.length})` : ''}
            </div>
          </div>
          <div className="note-tab-content">
            {tab === 'private' && (
              <>
                <p style={{ fontSize: 12, color: '#aaa', marginBottom: 8 }}>你的私人備註，只顯示在你的裝置上。</p>
                <textarea
                  className="note-textarea"
                  placeholder="在這裡記下你的想法、個人反思或備忘..."
                  value={privateText}
                  onChange={e => setPrivateText(e.target.value)}
                />
                <button className="note-save-btn" onClick={savePrivate}>儲存備註</button>
              </>
            )}
            {tab === 'public' && (
              <>
                <p style={{ fontSize: 12, color: '#aaa', marginBottom: 10 }}>
                  團隊討論區。所有在此裝置上開啟的人都能看見與新增。
                </p>
                <div className="public-input-row">
                  <input className="name-input" placeholder="你的名字" value={authorName}
                    onChange={e => setAuthorName(e.target.value)} style={{ maxWidth: 120 }} />
                  <input className="name-input" placeholder="輸入留言或補充..." value={pubInput}
                    onChange={e => setPubInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addPublicNote()} style={{ flex: 1 }} />
                  <button className="note-save-btn" onClick={addPublicNote}>送出</button>
                </div>
                {publicNotes.length === 0
                  ? <div className="no-notes">目前還沒有討論，來開始第一則吧！</div>
                  : publicNotes.map(note => (
                      <div key={note.id} className="note-entry">
                        <div className="note-entry-header">
                          <span className="note-author">👤 {note.author}</span>
                          <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                            <span className="note-time">{formatTime(note.createdAt)}</span>
                            <button className="note-delete-btn" onClick={() => deletePublicNote(note.id)} title="刪除">✕</button>
                          </span>
                        </div>
                        <div className="note-text">{note.text}</div>
                      </div>
                    ))
                }
              </>
            )}
          </div>
          <div className="export-bar">
            <span>📤 備份與分享：</span>
            <button className="export-btn" onClick={() => {
              const data = STORAGE.exportAll();
              const blob = new Blob([data], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a'); a.href = url;
              a.download = 'MD手冊備註.json'; a.click(); URL.revokeObjectURL(url);
            }}>匯出備註</button>
            <button className="export-btn" onClick={() => {
              const input = document.createElement('input');
              input.type = 'file'; input.accept = '.json';
              input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = evt => {
                  try { STORAGE.importAll(evt.target.result); window.location.reload(); }
                  catch { alert('匯入失敗，請確認檔案格式正確。'); }
                };
                reader.readAsText(file);
              };
              input.click();
            }}>匯入備註</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════
//  SECTION VIEW
// ══════════════════════════════════════════════
function SectionView({ section }) {
  return (
    <div id={section.id} style={{ scrollMarginTop: 20 }}>
      <h3>{section.title}</h3>
      {section.content.map((node, idx) => renderContent(node, idx))}
      <NotesPanel sectionId={section.id} />
      <hr className="divider" />
    </div>
  );
}

// ══════════════════════════════════════════════
//  CHAPTER VIEW
// ══════════════════════════════════════════════
function ChapterView({ chapter }) {
  return (
    <>
      <div className="chapter-banner">
        <div className="chapter-label">
          {chapter.englishTitle ? `${chapter.subtitle} · ${chapter.englishTitle}` : chapter.subtitle}
        </div>
        <h2>{chapter.emoji} {chapter.title}{chapter.subtitle !== chapter.title ? `：${chapter.subtitle}` : ''}</h2>
        {chapter.englishTitle && <div className="chapter-sub">{chapter.englishTitle}</div>}
        {chapter.desc && <div className="chapter-desc">{chapter.desc}</div>}
      </div>
      <div className="content-body">
        {chapter.sections.map(sec => <SectionView key={sec.id} section={sec} />)}
      </div>
    </>
  );
}

// ══════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════
function Sidebar({ current, onSelect, collapsed, setCollapsed }) {
  const [openChapters, setOpenChapters] = useState({ [current]: true });
  const toggleChapter = (id) => setOpenChapters(prev => ({ ...prev, [id]: !prev[id] }));

  return (
    <div className={`sidebar${collapsed ? ' collapsed' : ''}`}>
      <div className="sidebar-header">
        <div className="sidebar-logo">
          <div className="sidebar-logo-icon">🎵</div>
          {!collapsed && (
            <div className="sidebar-title-text">
              <h1>共鳴與捨己</h1>
              <p>新生命敬拜團 MD 養成手冊</p>
            </div>
          )}
        </div>
      </div>
      <nav className="sidebar-nav">
        {HANDBOOK.map(ch => {
          const isActive = current === ch.id;
          const isOpen = openChapters[ch.id];
          return (
            <div key={ch.id} className="nav-chapter">
              <button
                className={`nav-chapter-btn${isActive ? ' active' : ''}${isOpen ? ' open' : ''}`}
                onClick={() => {
                  onSelect(ch.id, null);
                  toggleChapter(ch.id);
                  setOpenChapters(prev => ({ ...prev, [ch.id]: !prev[ch.id] }));
                }}
                title={collapsed ? ch.title + '：' + ch.subtitle : ''}
              >
                <span className="emoji">{ch.emoji}</span>
                {!collapsed && (
                  <>
                    <span className="nav-label">
                      <span className="nav-main">{ch.title}</span>
                      <span className="nav-sub">{ch.subtitle}</span>
                    </span>
                    {ch.sections.length > 1 && <span className="arrow">▶</span>}
                  </>
                )}
              </button>
              {!collapsed && isOpen && ch.sections.length > 1 && (
                <div className="nav-sections" style={{ maxHeight: isOpen ? 500 : 0 }}>
                  {ch.sections.map(sec => (
                    <div key={sec.id}
                      className={`nav-section-item${current === ch.id ? '' : ''}`}
                      onClick={() => { onSelect(ch.id, sec.id); }}
                    >
                      {sec.title}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </nav>
      <div className="toggle-btn">
        <button onClick={() => setCollapsed(!collapsed)} title={collapsed ? '展開側欄' : '收合側欄'}>
          {collapsed ? '▶' : '◀'}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
//  APP
// ══════════════════════════════════════════════
function App() {
  const [currentChapterId, setCurrentChapterId] = useState('intro');
  const [collapsed, setCollapsed] = useState(false);
  const mainRef = useRef(null);

  const currentChapter = HANDBOOK.find(c => c.id === currentChapterId) || HANDBOOK[0];
  const chapterIdx = HANDBOOK.findIndex(c => c.id === currentChapterId);
  const progress = Math.round(((chapterIdx + 1) / HANDBOOK.length) * 100);

  const handleSelect = (chapterId, sectionId) => {
    setCurrentChapterId(chapterId);
    if (mainRef.current) mainRef.current.scrollTo({ top: 0, behavior: 'smooth' });
    if (sectionId) {
      setTimeout(() => {
        const el = document.getElementById(sectionId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }
  };

  const goNext = () => {
    if (chapterIdx < HANDBOOK.length - 1) handleSelect(HANDBOOK[chapterIdx + 1].id, null);
  };
  const goPrev = () => {
    if (chapterIdx > 0) handleSelect(HANDBOOK[chapterIdx - 1].id, null);
  };

  return (
    <div id="root">
      <Sidebar current={currentChapterId} onSelect={handleSelect} collapsed={collapsed} setCollapsed={setCollapsed} />
      <div className="main-area" ref={mainRef}>
        <div className="progress-bar-wrap">
          <div className="progress-bar-fill" style={{ width: `${progress}%` }} />
        </div>
        <ChapterView chapter={currentChapter} />
        {/* Chapter Navigation */}
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '24px 48px 48px', borderTop: '1px solid #e5e0d8', marginTop: 16
        }}>
          <button onClick={goPrev} disabled={chapterIdx === 0}
            style={{ background: chapterIdx === 0 ? '#f0ebe3' : '#1a1a35', color: chapterIdx === 0 ? '#bbb' : '#c9a84c',
              border: 'none', padding: '10px 20px', borderRadius: 8, cursor: chapterIdx === 0 ? 'default' : 'pointer',
              fontFamily: 'inherit', fontSize: 13, fontWeight: 600, transition: 'all .2s' }}>
            ← 上一章
          </button>
          <span style={{ fontSize: 12, color: '#aaa' }}>
            {chapterIdx + 1} / {HANDBOOK.length}
          </span>
          <button onClick={goNext} disabled={chapterIdx === HANDBOOK.length - 1}
            style={{ background: chapterIdx === HANDBOOK.length - 1 ? '#f0ebe3' : '#1a1a35',
              color: chapterIdx === HANDBOOK.length - 1 ? '#bbb' : '#c9a84c',
              border: 'none', padding: '10px 20px', borderRadius: 8,
              cursor: chapterIdx === HANDBOOK.length - 1 ? 'default' : 'pointer',
              fontFamily: 'inherit', fontSize: 13, fontWeight: 600, transition: 'all .2s' }}>
            下一章 →
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
